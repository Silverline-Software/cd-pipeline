name: Test Reusable v4 (permissions block)

on:
  workflow_call:
    inputs:
      project-display-name:
        type: string
        default: ''
      environment:
        type: string
        default: 'release-notes-hosting'
      release-tag:
        type: string
        default: ''
    secrets:
      RELEASE_NOTES_GCP_SA_KEY:
        required: false

permissions:
  contents: read
  checks: read

jobs:
  hello:
    name: Hello World
    runs-on: ubuntu-latest
    env:
      CURRENT_TAG: ${{ inputs.release-tag || github.event.release.tag_name || '' }}
    steps:
      - name: Say hello
        run: echo "env input=${{ inputs.environment }} tag=$CURRENT_TAG"
