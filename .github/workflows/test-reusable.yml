name: Test Reusable v3 (environment input name)

on:
  workflow_call:
    inputs:
      project-display-name:
        type: string
        default: ''
      environment:
        type: string
        default: 'release-notes-hosting'
    secrets:
      RELEASE_NOTES_GCP_SA_KEY:
        required: false

jobs:
  hello:
    name: Hello World
    runs-on: ubuntu-latest
    steps:
      - name: Say hello
        run: echo "env input=${{ inputs.environment }}"
