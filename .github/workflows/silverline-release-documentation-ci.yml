name: Silverline CD Pipeline CI

# Runs the full test suite and generates a branded release report on every push.
# On tag push: attaches reports to a GitHub release so the CD workflow can deploy them.
#
# Tag format:  release-v<X.Y.Z>
# Example:     release-v1.0.0  →  deploys to /release/v1.0.0/ on Firebase

on:
  push:
    branches: [main]
    tags:
      - '*-v*'
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: write   # needed for creating/updating GitHub releases on tags

jobs:

  # ── Test Suite ──────────────────────────────────────────────────────────────

  test:
    name: Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: pip install pytest pytest-bdd

      - name: Run acceptance tests
        run: |
          pytest test/acceptance/ \
            --junit-xml=test-results/bdd-results.xml \
            -v

      - name: Run unit tests
        run: |
          pytest test/unit/ \
            --junit-xml=test-results/unit-results.xml \
            -v

      - name: Upload BDD test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/bdd-results.xml
          retention-days: 90

      - name: Upload unit test results
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: test-results/unit-results.xml
          retention-days: 90

  # ── Generate API Docs ───────────────────────────────────────────────────────

  docs:
    name: Generate API Docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install doc dependencies
        run: pip install -r docs/requirements.txt

      - name: Build MkDocs site
        run: python -m mkdocs build --config-file mkdocs.yml --site-dir docs-site

      - name: Package docs site
        run: |
          cd docs-site
          zip -r ../docs-site.zip .

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: docs-site.zip
          retention-days: 90

  # ── Generate & Publish Report (tags only) ───────────────────────────────────

  silverline-report:
    name: Generate & Publish Report
    needs: [test, docs]
    if: startsWith(github.ref, 'refs/tags/')
    uses: ./.github/workflows/silverline-ci-reusable.yml
    with:
      bdd-xml-path: 'test-results/bdd-results.xml'
      backend-xml-path: 'test-results/unit-results.xml'
      features-dir: 'test/acceptance/features'
