name: Silverline Release Notes CD

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to deploy (leave empty to auto-detect latest)'
        required: false
        type: string

jobs:
  deploy:
    name: Deploy Release Reports
    uses: ./.github/workflows/silverline-cd-reusable.yml
    with:
      release-tag: ${{ inputs.release_tag || github.event.release.tag_name || '' }}
    secrets:
      RELEASE_NOTES_GCP_SA_KEY: ${{ secrets.RELEASE_NOTES_GCP_SA_KEY }}
