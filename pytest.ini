[pytest]
testpaths = test
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    req-GEN-01: Generator produces executive-report.json
    req-GEN-02: Generator produces executive-report.html
    req-GEN-03: Generated JSON contains the supplied release tag
    req-GEN-04: Generated JSON conforms to the executive report schema
    req-SCHEMA-01: validate_report passes for a valid report
    req-SCHEMA-02: validate_report reports missing keys
    req-SCHEMA-03: validate_report accepts int where float is expected
    req-PARSE-01: GherkinParser extracts scenario names
    req-PARSE-02: GherkinParser extracts req/FR tags
    req-PARSE-03: GherkinParser extracts step keywords
    req-PARSE-04: JUnitParser extracts pass/fail totals
    req-PARSE-05: JUnitParser maps scenario names to function names
    req-MAKE-01: make generate-example produces output files
    req-MAKE-02: make validate exits 0 with a valid manifest
    req-MAKE-03: make lint exits 0 on project scripts
    req-SITE-01: CD pipeline creates the Firebase Hosting site if it does not exist
    req-SITE-02: CD pipeline is idempotent when site already exists
    req-SITE-03: CD pipeline fails loudly on unexpected Firebase errors
